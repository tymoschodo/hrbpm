<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Anesthesia | BPM Orchestrator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #080808; font-family: 'Courier New', Courier, monospace; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #090909; }
        ::-webkit-scrollbar-thumb { background: #222; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MIN_BPM = 40;
        const MAX_BPM = 140;
        const TARGET_BPM = 50;
        const EQ_DURATION_MS = 60000;
        const LOOKAHEAD_SEC = 0.15;
        const SCHED_MS = 25;
        const TICK_MS = 50;

        /* ═══════════════════════════════════════════════════════
           AUDIO ENGINE
           All pulses share one grid origin so they phase-lock.
        ═══════════════════════════════════════════════════════ */
        class BpmEngine {
            constructor() {
                this.ctx = null;
                this.pulses = new Map();
                this._timer = null;
                this._origin = null;
            }
            _boot() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            _click(when, gain) {
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.connect(g); g.connect(gain);
                o.frequency.setValueAtTime(1200, when);
                o.frequency.exponentialRampToValueAtTime(300, when + 0.035);
                g.gain.setValueAtTime(0.001, when);
                g.gain.exponentialRampToValueAtTime(0.75, when + 0.003);
                g.gain.exponentialRampToValueAtTime(0.001, when + 0.055);
                o.start(when); o.stop(when + 0.06);
            }
            _aligned(bpm, from) {
                if (this._origin === null) return from + 0.05;
                const iv = 60 / bpm;
                const idx = Math.ceil((from - this._origin) / iv + 1e-6);
                return this._origin + idx * iv;
            }
            _sched() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const hor = now + LOOKAHEAD_SEC;
                for (const [, p] of this.pulses) {
                    if (!p.active) continue;
                    const iv = 60 / p.bpm;
                    while (p.next <= hor) {
                        if (p.next >= now - 0.005) this._click(p.next, p.gain);
                        p.next += iv;
                    }
                }
            }
            _loop() {
                if (this._timer) return;
                const run = () => { this._sched(); this._timer = setTimeout(run, SCHED_MS); };
                run();
            }
            add(id, bpm) {
                this._boot();
                const now = this.ctx.currentTime;
                if (this._origin === null) this._origin = now;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(1, now);
                gain.connect(this.ctx.destination);
                this.pulses.set(id, { bpm, active: true, gain, next: this._aligned(bpm, now) });
                this._loop();
            }
            stop(id) {
                const p = this.pulses.get(id); if (!p) return;
                p.active = false;
                const t = this.ctx.currentTime;
                p.gain.gain.cancelScheduledValues(t);
                p.gain.gain.setTargetAtTime(0, t, 0.03);
                setTimeout(() => { try { p.gain.disconnect(); } catch{} this.pulses.delete(id); }, 300);
            }
            fade(id, ms = 5000) {
                const p = this.pulses.get(id); if (!p) return;
                const t = this.ctx.currentTime;
                p.gain.gain.cancelScheduledValues(t);
                p.gain.gain.setValueAtTime(p.gain.gain.value, t);
                p.gain.gain.linearRampToValueAtTime(0, t + ms / 1000);
                setTimeout(() => { p.active = false; try { p.gain.disconnect(); } catch{} this.pulses.delete(id); }, ms + 200);
            }
            setBpm(id, bpm) {
                const p = this.pulses.get(id); if (!p) return;
                p.bpm = Math.max(MIN_BPM, Math.min(MAX_BPM, bpm));
                if (this.ctx && p.next < this.ctx.currentTime)
                    p.next = this._aligned(p.bpm, this.ctx.currentTime);
            }
            active() {
                return [...this.pulses.entries()].filter(([,p]) => p.active).map(([id,p]) => ({ id, bpm: p.bpm }));
            }
            destroy() {
                if (this._timer) clearTimeout(this._timer);
                this._timer = null;
                if (this.ctx) this.ctx.close();
            }
        }

        /* ═══════════════════════════════════════════════════════
           EQUALIZATION — linear interpolation to TARGET_BPM in 60s
           rate per pulse = (startBpm - 50) / 60  BPM/s
        ═══════════════════════════════════════════════════════ */
        class Equalizer {
            constructor(engine, onTick, onDone) {
                this.engine = engine;
                this.onTick = onTick;
                this.onDone = onDone;
                this._iv = null;
            }
            start(initial) {
                // initial: Map<id, bpm>
                this._starts = new Map(initial);
                this._ids = [...initial.keys()];
                this._t0 = performance.now();
                this._iv = setInterval(() => {
                    const t = Math.min((performance.now() - this._t0) / EQ_DURATION_MS, 1);
                    const cur = new Map();
                    for (const id of this._ids) {
                        const bpm = this._starts.get(id) + (TARGET_BPM - this._starts.get(id)) * t;
                        cur.set(id, bpm);
                        this.engine.setBpm(id, bpm);
                    }
                    this.onTick(cur, t);
                    if (t >= 1) {
                        clearInterval(this._iv);
                        for (const id of this._ids) this.engine.setBpm(id, TARGET_BPM);
                        this.onDone(TARGET_BPM);
                    }
                }, TICK_MS);
            }
            abort() { if (this._iv) clearInterval(this._iv); }
        }

        /* ═══════════════════════════════════════════════════════
           TINY COMPONENTS
        ═══════════════════════════════════════════════════════ */
        const css = {
            root: { minHeight:'100vh', display:'flex', flexDirection:'column', color:'#c8c8c8', fontSize:12, letterSpacing:'0.04em' },
            hdr:  { display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 20px', borderBottom:'1px solid #161616', background:'#090909' },
            body: { display:'flex', flex:1, overflow:'hidden' },
            side: { width:260, flexShrink:0, borderRight:'1px solid #141414', display:'flex', flexDirection:'column', overflow:'hidden' },
            sec:  { padding:'14px 16px', borderBottom:'1px solid #141414' },
            lbl:  { fontSize:9, color:'#333', letterSpacing:'0.25em', marginBottom:10 },
            inp:  { width:'100%', background:'#0d0d0d', border:'1px solid #202020', color:'#d8d8d8', padding:'6px 9px', fontSize:13, outline:'none', fontFamily:'inherit', letterSpacing:'0.1em' },
            err:  { color:'#f94144', fontSize:10, margin:'4px 0' },
            btnW: { width:'100%', background:'#d8d8d8', color:'#000', border:'none', padding:'7px 0', fontSize:10, letterSpacing:'0.2em', cursor:'pointer', fontFamily:'inherit', fontWeight:'bold', marginTop:6 },
            btnE: { width:'100%', border:'1px solid', padding:'9px 0', fontSize:10, letterSpacing:'0.2em', cursor:'pointer', fontFamily:'inherit', fontWeight:'bold' },
            trk:  { background:'#111', height:2, marginTop:6 },
            fill: { height:'100%', transition:'width 0.1s linear' },
            main: { flex:1, overflowY:'auto', padding:'10px 12px' },
            row:  { display:'flex', alignItems:'center', gap:10, border:'1px solid', marginBottom:6, padding:'9px 12px', minHeight:54, transition:'border-color .3s, background .3s' },
            sbar: { display:'flex', gap:24, padding:'7px 16px', borderTop:'1px solid #111', background:'#090909' },
        };

        function SLabel({ children }) {
            return <div style={css.lbl}>{children}</div>;
        }

        function Field({ label, children }) {
            return <div style={{ marginBottom:8 }}>
                <div style={{ fontSize:9, color:'#444', marginBottom:4, letterSpacing:'0.18em' }}>{label}</div>
                {children}
            </div>;
        }

        function Btn({ label, color, onClick, title, disabled, w }) {
            return <button
                onClick={onClick} title={title} disabled={disabled}
                style={{
                    background:'transparent',
                    border:`1px solid ${disabled?'#181818':color}`,
                    color: disabled?'#222':color,
                    width: w||30, height:26, fontSize:11,
                    cursor: disabled?'not-allowed':'pointer',
                    fontFamily:'inherit',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    opacity: disabled?0.4:1, flexShrink:0,
                }}
            >{label}</button>;
        }

        /* ═══════════════════════════════════════════════════════
           MAIN APP
        ═══════════════════════════════════════════════════════ */
        function App() {
            /* --- list state --- */
            const [nodes, setNodes]       = useState([]);   // {id, name, bpm}
            const [nameIn, setNameIn]     = useState('');
            const [bpmIn,  setBpmIn]      = useState('');
            const [addErr, setAddErr]     = useState('');

            /* --- playback state --- */
            const [playing, setPlaying]   = useState(new Set()); // ids
            const [fading,  setFading]    = useState(new Set());
            const [live,    setLive]      = useState(new Map()); // id→bpm (live during eq)

            /* --- edit state --- */
            const [editId,  setEditId]    = useState(null);
            const [editNm,  setEditNm]    = useState('');
            const [editBpm, setEditBpm]   = useState('');
            const [editErr, setEditErr]   = useState('');

            /* --- eq state --- */
            const [eqOn,   setEqOn]       = useState(false);
            const [eqProg, setEqProg]     = useState(0);
            const [eqDone, setEqDone]     = useState(false);

            /* --- log & clock --- */
            const [log,   setLog]         = useState([]);
            const [clock, setClock]       = useState('');

            const eng  = useRef(null);
            const eq   = useRef(null);

            useEffect(() => {
                eng.current = new BpmEngine();
                const t = setInterval(() => setClock(new Date().toTimeString().slice(0,8)), 1000);
                return () => { eng.current.destroy(); clearInterval(t); };
            }, []);

            const log$ = useCallback((msg, col='#888') => {
                setLog(p => [{ ts: new Date().toTimeString().slice(0,8), msg, col }, ...p].slice(0, 80));
            }, []);

            /* ── ADD NODE ── */
            const doAdd = () => {
                const name = nameIn.trim().toUpperCase();
                if (!name)                              { setAddErr('ID wymagane'); return; }
                if (!/^[A-Z0-9]+$/.test(name))         { setAddErr('Tylko litery i cyfry'); return; }
                if (nodes.find(n => n.name === name))   { setAddErr('ID już istnieje'); return; }
                const bpm = parseInt(bpmIn);
                if (isNaN(bpm)||bpm<MIN_BPM||bpm>MAX_BPM) { setAddErr(`BPM: ${MIN_BPM}–${MAX_BPM}`); return; }
                const node = { id: Math.random().toString(36).slice(2,8).toUpperCase(), name, bpm };
                setNodes(p => [...p, node]);
                log$(`DODANO ${name} @ ${bpm} BPM`, '#7df9d0');
                setNameIn(''); setBpmIn(''); setAddErr('');
            };

            /* ── PLAY / STOP / FADE ── */
            const doPlay = node => {
                if (playing.has(node.id)) return;
                eng.current.add(node.id, node.bpm);
                setPlaying(p => new Set([...p, node.id]));
                setLive(p => new Map([...p, [node.id, node.bpm]]));
                log$(`PULS ON  ${node.name} @ ${node.bpm}`, '#7df9d0');
            };
            const doStop = node => {
                eng.current.stop(node.id);
                setPlaying(p => { const s=new Set(p); s.delete(node.id); return s; });
                setFading(p =>  { const s=new Set(p); s.delete(node.id); return s; });
                setLive(p =>    { const m=new Map(p); m.delete(node.id); return m; });
                log$(`PULS OFF ${node.name}`, '#f94144');
            };
            const doFade = node => {
                if (fading.has(node.id)) return;
                eng.current.fade(node.id, 5000);
                setFading(p => new Set([...p, node.id]));
                log$(`FADE     ${node.name}`, '#f9c74f');
                setTimeout(() => {
                    setPlaying(p => { const s=new Set(p); s.delete(node.id); return s; });
                    setFading(p =>  { const s=new Set(p); s.delete(node.id); return s; });
                    setLive(p =>    { const m=new Map(p); m.delete(node.id); return m; });
                }, 5500);
            };

            /* ── EDIT ── */
            const startEdit = node => {
                setEditId(node.id); setEditNm(node.name);
                setEditBpm(String(node.bpm)); setEditErr('');
            };
            const cancelEdit = () => { setEditId(null); setEditErr(''); };
            const saveEdit = node => {
                const name = editNm.trim().toUpperCase();
                if (!name || !/^[A-Z0-9]+$/.test(name))            { setEditErr('Błędne ID'); return; }
                if (nodes.find(n => n.name===name && n.id!==node.id)) { setEditErr('ID zajęte'); return; }
                const bpm = parseInt(editBpm);
                if (isNaN(bpm)||bpm<MIN_BPM||bpm>MAX_BPM)          { setEditErr(`${MIN_BPM}–${MAX_BPM}`); return; }
                setNodes(p => p.map(n => n.id===node.id ? {...n, name, bpm} : n));
                if (playing.has(node.id)) {
                    eng.current.setBpm(node.id, bpm);
                    setLive(p => new Map([...p, [node.id, bpm]]));
                }
                log$(`EDYCJA ${node.name} → ${name} @ ${bpm} BPM`, '#7df9d0');
                setEditId(null);
            };

            /* ── DELETE ── */
            const doDelete = node => {
                if (playing.has(node.id)) doStop(node);
                setNodes(p => p.filter(n => n.id !== node.id));
                if (editId === node.id) setEditId(null);
                log$(`USUNIĘTO ${node.name}`, '#f94144');
            };

            /* ── EQUALIZE ── */
            const doEq = () => {
                if (eqOn) {
                    eq.current?.abort();
                    setEqOn(false); setEqProg(0);
                    log$('EQUALIZACJA PRZERWANA', '#f94144');
                    return;
                }
                const cur = eng.current.active();
                if (cur.length < 1) { log$('Brak aktywnych pulsów', '#f94144'); return; }
                const init = new Map(cur.map(({id,bpm}) => [id,bpm]));
                eq.current = new Equalizer(
                    eng.current,
                    (bpms, t) => { setLive(new Map(bpms)); setEqProg(t); },
                    done => {
                        setEqOn(false); setEqDone(true); setEqProg(1);
                        setNodes(p => p.map(n => init.has(n.id) ? {...n, bpm: done} : n));
                        log$(`✦ EQUALIZED @ ${done} BPM`, '#00ff88');
                    }
                );
                eq.current.start(init);
                setEqOn(true); setEqDone(false); setEqProg(0);
                log$(`EQUALIZACJA → ${TARGET_BPM} BPM / 60s`, '#7df9d0');
            };

            /* ── RENDER ── */
            const activeBpms = [...playing].map(id => live.get(id) || 0);
            const avg = activeBpms.length ? Math.round(activeBpms.reduce((a,b)=>a+b,0)/activeBpms.length) : null;

            return (
                <div style={css.root}>

                    {/* HEADER */}
                    <header style={css.hdr}>
                        <div>
                            <div style={{ fontSize:9, color:'#333', letterSpacing:'0.2em' }}>ANTHROPIC SYSTEMS · PERFORMANCE TOOL</div>
                            <div style={{ fontSize:14, fontWeight:'bold', color:'#e0e0e0', letterSpacing:'0.15em', marginTop:2 }}>
                                GENERAL ANESTHESIA / BPM ORCHESTRATOR
                            </div>
                        </div>
                        <div style={{ textAlign:'right' }}>
                            <div style={{ fontSize:20, color:'#e8e8e8', fontVariantNumeric:'tabular-nums' }}>{clock||'00:00:00'}</div>
                            <div style={{ fontSize:9, color:'#333', letterSpacing:'0.2em', marginTop:2 }}>
                                {playing.size} AKTYWNYCH{avg ? ` · AVG ${avg} BPM` : ''}
                            </div>
                        </div>
                    </header>

                    <div style={css.body}>

                        {/* SIDEBAR */}
                        <aside style={css.side}>

                            {/* registration */}
                            <section style={css.sec}>
                                <SLabel>◈ REJESTRACJA WĘZŁA</SLabel>
                                <Field label="ID UCZESTNIKA">
                                    <input style={css.inp} value={nameIn}
                                        onChange={e => { setNameIn(e.target.value.toUpperCase()); setAddErr(''); }}
                                        onKeyDown={e => e.key==='Enter' && doAdd()}
                                        placeholder="7X22N4" maxLength={10} />
                                </Field>
                                <Field label={`TEMPO (${MIN_BPM}–${MAX_BPM} BPM)`}>
                                    <input style={css.inp} type="number" value={bpmIn}
                                        onChange={e => { setBpmIn(e.target.value); setAddErr(''); }}
                                        onKeyDown={e => e.key==='Enter' && doAdd()}
                                        placeholder="72" min={MIN_BPM} max={MAX_BPM} />
                                </Field>
                                {addErr && <div style={css.err}>▲ {addErr}</div>}
                                <button style={css.btnW} onClick={doAdd}>+ ZAREJESTRUJ</button>
                            </section>

                            {/* equalize */}
                            <section style={css.sec}>
                                <SLabel>◈ EQUALIZACJA → {TARGET_BPM} BPM / 60s</SLabel>
                                <button style={{
                                    ...css.btnE,
                                    borderColor: eqOn ? '#f94144' : '#00ff88',
                                    color:       eqOn ? '#f94144' : '#00ff88',
                                    background:  eqOn ? 'rgba(249,65,68,.07)' : 'rgba(0,255,136,.04)',
                                }} onClick={doEq}>
                                    {eqOn ? '■ PRZERWIJ' : '⟳ EQUALIZE'}
                                </button>
                                {(eqOn || eqDone) && (
                                    <div style={{ marginTop:10 }}>
                                        <div style={{ fontSize:9, letterSpacing:'0.15em', marginBottom:5, color: eqDone?'#00ff88':'#f9c74f' }}>
                                            {eqDone ? `✦ UKOŃCZONO @ ${TARGET_BPM} BPM` : `▶ ZBIEŻNOŚĆ → ${TARGET_BPM} BPM`}
                                        </div>
                                        <div style={css.trk}>
                                            <div style={{ ...css.fill, width:`${eqProg*100}%`, background: eqDone?'#00ff88':'#f9c74f' }} />
                                        </div>
                                        <div style={{ fontSize:9, color:'#444', marginTop:4 }}>
                                            {Math.round(eqProg*60)}s / 60s
                                        </div>
                                    </div>
                                )}
                            </section>

                            {/* log */}
                            <section style={{ ...css.sec, flex:1, overflow:'hidden', display:'flex', flexDirection:'column', borderBottom:'none' }}>
                                <SLabel>◈ LOG SYSTEMOWY</SLabel>
                                <div style={{ flex:1, overflowY:'auto' }}>
                                    {log.map((l,i) => (
                                        <div key={i} style={{ display:'flex', gap:6, marginBottom:4, opacity: Math.max(0.18, 1-i*0.04) }}>
                                            <span style={{ color:'#2e2e2e', flexShrink:0, fontSize:10 }}>{l.ts}</span>
                                            <span style={{ color: i===0 ? l.col : '#484848', fontSize:10 }}>{l.msg}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </aside>

                        {/* MAIN LIST */}
                        <main style={css.main}>
                            {nodes.length === 0 && (
                                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'60vh', color:'#222', fontSize:11, letterSpacing:'0.2em' }}>
                                    <div style={{ fontSize:32, marginBottom:8 }}>⊙</div>
                                    <div>BRAK WĘZŁÓW</div>
                                </div>
                            )}

                            {nodes.map(node => {
                                const isOn  = playing.has(node.id);
                                const isFad = fading.has(node.id);
                                const isEd  = editId === node.id;
                                const bpm   = live.has(node.id) ? live.get(node.id) : node.bpm;
                                const disp  = Math.round(bpm * 10) / 10;
                                const bar   = Math.max(0, Math.min(100, ((bpm-MIN_BPM)/(MAX_BPM-MIN_BPM))*100));

                                return (
                                    <div key={node.id} style={{
                                        ...css.row,
                                        background:  isOn ? '#0b0b0b' : '#080808',
                                        borderColor: isOn ? (eqOn ? '#35300f' : '#0f2e18') : '#111',
                                    }}>
                                        {isEd ? (
                                            /* ─── EDIT MODE ─── */
                                            <div style={{ flex:1, display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
                                                <input
                                                    autoFocus
                                                    style={{ ...css.inp, width:82, padding:'4px 7px', fontSize:12 }}
                                                    value={editNm}
                                                    onChange={e => setEditNm(e.target.value.toUpperCase())}
                                                    onKeyDown={e => { if(e.key==='Enter') saveEdit(node); if(e.key==='Escape') cancelEdit(); }}
                                                    maxLength={10}
                                                />
                                                <input
                                                    style={{ ...css.inp, width:62, padding:'4px 7px', fontSize:12 }}
                                                    type="number" value={editBpm}
                                                    onChange={e => setEditBpm(e.target.value)}
                                                    onKeyDown={e => { if(e.key==='Enter') saveEdit(node); if(e.key==='Escape') cancelEdit(); }}
                                                    min={MIN_BPM} max={MAX_BPM}
                                                />
                                                {editErr && <span style={{ color:'#f94144', fontSize:10 }}>▲ {editErr}</span>}
                                                <Btn label="✓" color="#00ff88" onClick={() => saveEdit(node)}  title="Zapisz (Enter)" />
                                                <Btn label="✕" color="#f94144" onClick={cancelEdit}            title="Anuluj (Esc)" />
                                            </div>
                                        ) : (
                                            /* ─── NORMAL MODE ─── */
                                            <>
                                                {/* status dot */}
                                                <div style={{
                                                    width:7, height:7, borderRadius:'50%', flexShrink:0,
                                                    background: isFad ? '#f9c74f' : isOn ? '#00ff88' : '#1c1c1c',
                                                    boxShadow: isOn ? `0 0 7px ${isFad?'#f9c74f60':'#00ff8860'}` : 'none',
                                                    animation: isOn && !isFad ? 'blink 1.2s ease-in-out infinite' : 'none',
                                                }} />

                                                {/* name */}
                                                <div style={{ width:80, flexShrink:0, fontSize:14, fontWeight:'bold', letterSpacing:'0.1em', color: isOn?'#e8e8e8':'#383838' }}>
                                                    {node.name}
                                                </div>

                                                {/* bpm + bar */}
                                                <div style={{ flex:1, minWidth:0 }}>
                                                    <div style={{ display:'flex', alignItems:'baseline', gap:4, marginBottom:4 }}>
                                                        <span style={{ fontSize:20, fontVariantNumeric:'tabular-nums', transition:'color .5s', color: isOn?(eqOn?'#f9c74f':'#d8d8d8'):'#282828' }}>
                                                            {disp}
                                                        </span>
                                                        <span style={{ fontSize:9, color:'#3a3a3a', letterSpacing:'0.15em' }}>BPM</span>
                                                    </div>
                                                    <div style={{ background:'#111', height:2 }}>
                                                        <div style={{ height:'100%', width:`${bar}%`, transition:'width .08s linear, background .5s', background: isOn?(eqOn?'#f9c74f':'#00ff88'):'#1c1c1c' }} />
                                                    </div>
                                                </div>

                                                {/* controls */}
                                                <div style={{ display:'flex', gap:4, flexShrink:0, alignItems:'center' }}>
                                                    {/* play / stop / fade */}
                                                    {!isOn
                                                        ? <Btn label="▶" color="#00ff88" onClick={() => doPlay(node)} title="Odtwórz" />
                                                        : <>
                                                            <Btn label="◼" color="#f94144" onClick={() => doStop(node)} title="Zatrzymaj" />
                                                            <Btn label={isFad?'…':'↓'} color="#f9c74f" disabled={isFad} onClick={() => doFade(node)} title="Wycisz" />
                                                          </>
                                                    }
                                                    {/* divider */}
                                                    <div style={{ width:1, height:18, background:'#1e1e1e', margin:'0 2px' }} />
                                                    {/* edit */}
                                                    <Btn label="✎" color="#7df9d0" onClick={() => startEdit(node)} title="Edytuj" w={26} />
                                                    {/* delete */}
                                                    <Btn label="✕" color="#555"    onClick={() => doDelete(node)}  title="Usuń"   w={26} />
                                                </div>
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                        </main>
                    </div>

                    {/* STATUS BAR */}
                    <footer style={css.sbar}>
                        {[
                            { k:'WĘZŁY',     v: nodes.length,   c:'#555'    },
                            { k:'AKTYWNE',   v: playing.size,   c:'#00ff88' },
                            { k:'WYCISZANE', v: fading.size,    c:'#f9c74f' },
                            eqOn ? { k:'EQ', v:`${Math.round(eqProg*100)}%`, c:'#f9c74f' } : null,
                        ].filter(Boolean).map(x => (
                            <div key={x.k} style={{ display:'flex', gap:6, alignItems:'baseline' }}>
                                <span style={{ fontSize:9, color:'#2e2e2e', letterSpacing:'0.2em' }}>{x.k}</span>
                                <span style={{ fontSize:14, color:x.c }}>{x.v}</span>
                            </div>
                        ))}
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
