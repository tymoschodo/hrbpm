<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Anesthesia | BPM Orchestrator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #080808; overflow-x: hidden;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MIN_BPM = 40;
        const MAX_BPM = 140;
        const TARGET_BPM = 50;
        const EQ_DURATION_MS = 60000; // 60 sekund do osiągnięcia 50 BPM
        const LOOKAHEAD_SEC = 0.15;
        const SCHEDULER_INTERVAL_MS = 25;
        const TICK_MS = 50;

        // ─── MASTER CLOCK ENGINE ─────────────────────────────────────────────────────
        // Wszystkie pulsy dzielą wspólny grid — nowy puls startuje na najbliższym
        // uderzeniu siatki, żeby nie było przesunięcia fazowego.
        class BpmEngine {
            constructor() {
                this.ctx = null;
                this.pulses = new Map();
                this._timerID = null;
                this._gridOrigin = null;
            }

            _ensureContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === "suspended") this.ctx.resume();
            }

            _click(when, gainNode) {
                const osc = this.ctx.createOscillator();
                const env = this.ctx.createGain();
                osc.connect(env);
                env.connect(gainNode);
                osc.frequency.setValueAtTime(1200, when);
                osc.frequency.exponentialRampToValueAtTime(300, when + 0.035);
                env.gain.setValueAtTime(0.001, when);
                env.gain.exponentialRampToValueAtTime(0.75, when + 0.003);
                env.gain.exponentialRampToValueAtTime(0.001, when + 0.055);
                osc.start(when);
                osc.stop(when + 0.06);
            }

            _nextAlignedBeat(bpm, fromTime) {
                if (this._gridOrigin === null) return fromTime + 0.05;
                const interval = 60 / bpm;
                const elapsed = fromTime - this._gridOrigin;
                const nextBeatIdx = Math.ceil(elapsed / interval + 1e-6);
                return this._gridOrigin + nextBeatIdx * interval;
            }

            _scheduler() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const horizon = now + LOOKAHEAD_SEC;
                for (const [, p] of this.pulses) {
                    if (!p.active) continue;
                    const interval = 60 / p.bpm;
                    while (p.nextTime <= horizon) {
                        if (p.nextTime >= now - 0.005) this._click(p.nextTime, p.gainNode);
                        p.nextTime += interval;
                    }
                }
            }

            _startLoop() {
                if (this._timerID) return;
                const loop = () => {
                    this._scheduler();
                    this._timerID = setTimeout(loop, SCHEDULER_INTERVAL_MS);
                };
                loop();
            }

            addPulse(id, bpm) {
                this._ensureContext();
                const now = this.ctx.currentTime;
                if (this._gridOrigin === null) this._gridOrigin = now;
                const gainNode = this.ctx.createGain();
                gainNode.gain.setValueAtTime(1, now);
                gainNode.connect(this.ctx.destination);
                const nextTime = this._nextAlignedBeat(bpm, now);
                this.pulses.set(id, { bpm, active: true, gainNode, nextTime });
                this._startLoop();
            }

            stopPulse(id) {
                const p = this.pulses.get(id);
                if (!p) return;
                p.active = false;
                const t = this.ctx.currentTime;
                p.gainNode.gain.cancelScheduledValues(t);
                p.gainNode.gain.setTargetAtTime(0, t, 0.03);
                setTimeout(() => { try { p.gainNode.disconnect(); } catch {} this.pulses.delete(id); }, 300);
            }

            fadePulse(id, durationMs = 5000) {
                const p = this.pulses.get(id);
                if (!p) return;
                const t = this.ctx.currentTime;
                p.gainNode.gain.cancelScheduledValues(t);
                p.gainNode.gain.setValueAtTime(p.gainNode.gain.value, t);
                p.gainNode.gain.linearRampToValueAtTime(0, t + durationMs / 1000);
                setTimeout(() => {
                    p.active = false;
                    try { p.gainNode.disconnect(); } catch {}
                    this.pulses.delete(id);
                }, durationMs + 200);
            }

            setBpm(id, bpm) {
                const p = this.pulses.get(id);
                if (!p) return;
                const clamped = Math.max(MIN_BPM, Math.min(MAX_BPM, bpm));
                p.bpm = clamped;
                if (this.ctx && p.nextTime < this.ctx.currentTime) {
                    p.nextTime = this._nextAlignedBeat(clamped, this.ctx.currentTime);
                }
            }

            getActivePulses() {
                return [...this.pulses.entries()]
                    .filter(([, p]) => p.active)
                    .map(([id, p]) => ({ id, bpm: p.bpm }));
            }

            destroy() {
                if (this._timerID) clearTimeout(this._timerID);
                this._timerID = null;
                if (this.ctx) this.ctx.close();
            }
        }

        // ─── EQUALIZATION LOGIC ───────────────────────────────────────────────────────
        // Każdy puls zmierza liniowo do TARGET_BPM (50) w ciągu EQ_DURATION_MS (60s).
        // Prędkość zmiany = (startBpm - 50) / 60s  — proporcjonalna do odległości.
        class EqualizationLogic {
            constructor(engine, onUpdate, onComplete) {
                this.engine = engine;
                this.onUpdate = onUpdate;
                this.onComplete = onComplete;
                this._interval = null;
            }

            start(initialBpms) {
                // initialBpms: Map<id, bpm>
                this._ids = [...initialBpms.keys()];
                this._startBpms = new Map(initialBpms);
                this._startTime = performance.now();

                this._interval = setInterval(() => {
                    const elapsed = performance.now() - this._startTime;
                    const t = Math.min(elapsed / EQ_DURATION_MS, 1); // 0..1 liniowo

                    const current = new Map();
                    for (const id of this._ids) {
                        const start = this._startBpms.get(id);
                        // liniowa interpolacja: start → TARGET_BPM
                        const bpm = start + (TARGET_BPM - start) * t;
                        current.set(id, bpm);
                        this.engine.setBpm(id, bpm);
                    }

                    this.onUpdate(current, t);

                    if (t >= 1) {
                        clearInterval(this._interval);
                        // Snap do dokładnie 50
                        for (const id of this._ids) this.engine.setBpm(id, TARGET_BPM);
                        this.onComplete(TARGET_BPM);
                    }
                }, TICK_MS);
            }

            stop() {
                if (this._interval) clearInterval(this._interval);
            }
        }

        // ─── HELPERS ─────────────────────────────────────────────────────────────────
        const uid = () => Math.random().toString(36).slice(2, 8).toUpperCase();

        function Label({ children }) {
            return <div style={{ fontSize: 9, color: "#333", letterSpacing: "0.25em", marginBottom: 10 }}>{children}</div>;
        }

        function FieldRow({ label, children }) {
            return (
                <div style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 9, color: "#444", marginBottom: 4, letterSpacing: "0.18em" }}>{label}</div>
                    {children}
                </div>
            );
        }

        function Btn({ label, color, onClick, title, disabled, small }) {
            return (
                <button onClick={onClick} title={title} disabled={disabled} style={{
                    background: "transparent",
                    border: `1px solid ${disabled ? "#181818" : color}`,
                    color: disabled ? "#222" : color,
                    width: small ? 26 : 30,
                    height: 26,
                    fontSize: small ? 10 : 11,
                    cursor: disabled ? "not-allowed" : "pointer",
                    fontFamily: "inherit",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    opacity: disabled ? 0.4 : 1,
                    transition: "all .12s", flexShrink: 0,
                }}>{label}</button>
            );
        }

        // ─── MAIN APP ────────────────────────────────────────────────────────────────
        function App() {
            const [entries, setEntries]           = useState([]);
            const [nameInput, setNameInput]       = useState("");
            const [tempoInput, setTempoInput]     = useState("");
            const [inputError, setInputError]     = useState("");

            const [activePulses, setActivePulses] = useState(new Set());
            const [fadingPulses, setFadingPulses] = useState(new Set());
            const [liveBpms, setLiveBpms]         = useState(new Map());

            // edycja inline
            const [editingId, setEditingId]   = useState(null);
            const [editName, setEditName]     = useState("");
            const [editTempo, setEditTempo]   = useState("");
            const [editError, setEditError]   = useState("");

            const [eqActive, setEqActive]     = useState(false);
            const [eqProgress, setEqProgress] = useState(0); // 0..1
            const [eqDone, setEqDone]         = useState(false);

            const [log, setLog]     = useState([]);
            const [clock, setClock] = useState("");

            const engineRef = useRef(null);
            const eqRef     = useRef(null);

            useEffect(() => {
                engineRef.current = new BpmEngine();
                const t = setInterval(() => setClock(new Date().toTimeString().slice(0, 8)), 1000);
                return () => { engineRef.current?.destroy(); clearInterval(t); };
            }, []);

            const pushLog = useCallback((msg, color = "#888") => {
                setLog(p => [{ ts: new Date().toTimeString().slice(0, 8), msg, color }, ...p].slice(0, 60));
            }, []);

            // ── Rejestracja ──
            const handleAdd = () => {
                const name = nameInput.trim().toUpperCase();
                if (!name || !/^[A-Z0-9]+$/.test(name)) { setInputError("Błędne ID"); return; }
                if (entries.find(e => e.name === name))   { setInputError("ID zajęte"); return; }
                const bpm = parseInt(tempoInput);
                if (isNaN(bpm) || bpm < MIN_BPM || bpm > MAX_BPM) { setInputError(`BPM: ${MIN_BPM}–${MAX_BPM}`); return; }
                const entry = { id: uid(), name, bpm };
                setEntries(p => [...p, entry]);
                pushLog(`ZAREJESTROWANO ${name} @ ${bpm} BPM`, "#7df9d0");
                setNameInput(""); setTempoInput(""); setInputError("");
            };

            // ── Play / Stop / Fade ──
            const handlePlay = entry => {
                if (activePulses.has(entry.id)) return;
                engineRef.current.addPulse(entry.id, entry.bpm);
                setActivePulses(p => new Set([...p, entry.id]));
                setLiveBpms(p => new Map([...p, [entry.id, entry.bpm]]));
                pushLog(`PULS ON ${entry.name} @ ${entry.bpm} BPM`, "#7df9d0");
            };

            const handleStop = entry => {
                engineRef.current.stopPulse(entry.id);
                setActivePulses(p => { const s = new Set(p); s.delete(entry.id); return s; });
                setFadingPulses(p => { const s = new Set(p); s.delete(entry.id); return s; });
                setLiveBpms(p => { const m = new Map(p); m.delete(entry.id); return m; });
                pushLog(`PULS OFF ${entry.name}`, "#f94144");
            };

            const handleFade = entry => {
                if (fadingPulses.has(entry.id)) return;
                engineRef.current.fadePulse(entry.id, 5000);
                setFadingPulses(p => new Set([...p, entry.id]));
                pushLog(`WYCISZENIE ${entry.name}`, "#f9c74f");
                setTimeout(() => {
                    setActivePulses(p => { const s = new Set(p); s.delete(entry.id); return s; });
                    setFadingPulses(p => { const s = new Set(p); s.delete(entry.id); return s; });
                    setLiveBpms(p => { const m = new Map(p); m.delete(entry.id); return m; });
                }, 5500);
            };

            // ── Edycja ──
            const startEdit = entry => {
                setEditingId(entry.id);
                setEditName(entry.name);
                setEditTempo(String(entry.bpm));
                setEditError("");
            };

            const cancelEdit = () => { setEditingId(null); setEditError(""); };

            const commitEdit = entry => {
                const name = editName.trim().toUpperCase();
                if (!name || !/^[A-Z0-9]+$/.test(name))               { setEditError("Błędne ID"); return; }
                if (entries.find(e => e.name === name && e.id !== entry.id)) { setEditError("ID zajęte"); return; }
                const bpm = parseInt(editTempo);
                if (isNaN(bpm) || bpm < MIN_BPM || bpm > MAX_BPM)    { setEditError(`${MIN_BPM}–${MAX_BPM}`); return; }

                setEntries(p => p.map(e => e.id === entry.id ? { ...e, name, bpm } : e));
                if (activePulses.has(entry.id)) {
                    engineRef.current.setBpm(entry.id, bpm);
                    setLiveBpms(p => new Map([...p, [entry.id, bpm]]));
                }
                pushLog(`EDYCJA ${entry.name} → ${name} @ ${bpm} BPM`, "#7df9d0");
                setEditingId(null);
            };

            // ── Usuwanie ──
            const handleDelete = entry => {
                if (activePulses.has(entry.id)) handleStop(entry);
                setEntries(p => p.filter(e => e.id !== entry.id));
                if (editingId === entry.id) setEditingId(null);
                pushLog(`USUNIĘTO ${entry.name}`, "#f94144");
            };

            // ── Equalize → liniowo do 50 BPM w 60s ──
            const handleEqualize = () => {
                if (eqActive) {
                    eqRef.current?.stop();
                    setEqActive(false); setEqProgress(0);
                    pushLog("EQUALIZACJA PRZERWANA", "#f94144");
                    return;
                }
                const active = engineRef.current.getActivePulses();
                if (active.length < 1) { pushLog("Brak aktywnych pulsów", "#f94144"); return; }

                const initial = new Map(active.map(({ id, bpm }) => [id, bpm]));
                const eq = new EqualizationLogic(
                    engineRef.current,
                    (bpms, t) => {
                        setLiveBpms(new Map(bpms));
                        setEqProgress(t);
                    },
                    done => {
                        setEqActive(false);
                        setEqDone(true);
                        setEqProgress(1);
                        // zsynchronizuj entries do 50
                        setEntries(prev => prev.map(e =>
                            initial.has(e.id) ? { ...e, bpm: done } : e
                        ));
                        pushLog(`✦ EQUALIZED @ ${done} BPM`, "#00ff88");
                    }
                );
                eqRef.current = eq;
                eq.start(initial);
                setEqActive(true);
                setEqDone(false);
                setEqProgress(0);
                pushLog(`EQUALIZACJA START → cel: ${TARGET_BPM} BPM / 60s`, "#7df9d0");
            };

            const activeBpmsArr = [...activePulses].map(id => liveBpms.get(id) || 0);
            const avgBpm = activeBpmsArr.length
                ? Math.round(activeBpmsArr.reduce((a, b) => a + b, 0) / activeBpmsArr.length)
                : null;

            return (
                <div style={S.root}>
                    {/* ── Header ── */}
                    <header style={S.header}>
                        <div>
                            <div style={S.sub}>ANTHROPIC SYSTEMS · PERFORMANCE TOOL</div>
                            <div style={S.title}>GENERAL ANESTHESIA / BPM ORCHESTRATOR</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                            <div style={S.clock}>{clock || "00:00:00"}</div>
                            <div style={S.sub}>
                                {activePulses.size} AKTYWNYCH{avgBpm ? ` · AVG ${avgBpm} BPM` : ""}
                            </div>
                        </div>
                    </header>

                    <div style={S.body}>
                        {/* ── Sidebar ── */}
                        <aside style={S.aside}>

                            {/* Rejestracja */}
                            <section style={S.panel}>
                                <Label>◈ REJESTRACJA WĘZŁA</Label>
                                <FieldRow label="ID UCZESTNIKA">
                                    <input
                                        style={S.input}
                                        value={nameInput}
                                        onChange={e => { setNameInput(e.target.value.toUpperCase()); setInputError(""); }}
                                        onKeyDown={e => e.key === "Enter" && handleAdd()}
                                        placeholder="7X22N4"
                                        maxLength={10}
                                    />
                                </FieldRow>
                                <FieldRow label={`TEMPO (${MIN_BPM}–${MAX_BPM} BPM)`}>
                                    <input
                                        style={S.input}
                                        type="number"
                                        value={tempoInput}
                                        onChange={e => { setTempoInput(e.target.value); setInputError(""); }}
                                        onKeyDown={e => e.key === "Enter" && handleAdd()}
                                        placeholder="72"
                                        min={MIN_BPM} max={MAX_BPM}
                                    />
                                </FieldRow>
                                {inputError && <div style={S.err}>▲ {inputError}</div>}
                                <button style={S.btnWhite} onClick={handleAdd}>+ ZAREJESTRUJ</button>
                            </section>

                            {/* Equalizacja */}
                            <section style={S.panel}>
                                <Label>◈ EQUALIZACJA → {TARGET_BPM} BPM / 60s</Label>
                                <button
                                    style={{
                                        ...S.btnEq,
                                        borderColor: eqActive ? "#f94144" : "#00ff88",
                                        color:       eqActive ? "#f94144" : "#00ff88",
                                        background:  eqActive ? "rgba(249,65,68,.07)" : "rgba(0,255,136,.04)",
                                    }}
                                    onClick={handleEqualize}
                                >
                                    {eqActive ? "■ PRZERWIJ" : "⟳ EQUALIZE"}
                                </button>

                                {(eqActive || eqDone) && (
                                    <div style={{ marginTop: 10 }}>
                                        <div style={{ fontSize: 9, color: eqDone ? "#00ff88" : "#f9c74f", letterSpacing: "0.15em", marginBottom: 5 }}>
                                            {eqDone ? `✦ UKOŃCZONO @ ${TARGET_BPM} BPM` : `▶ ZBIEŻNOŚĆ → ${TARGET_BPM} BPM`}
                                        </div>
                                        <div style={S.track}>
                                            <div style={{
                                                ...S.fill,
                                                width: `${eqProgress * 100}%`,
                                                background: eqDone ? "#00ff88" : "#f9c74f",
                                                transition: "width 0.1s linear",
                                            }} />
                                        </div>
                                        <div style={{ fontSize: 9, color: "#444", marginTop: 4 }}>
                                            {Math.round(eqProgress * 60)}s / 60s
                                        </div>
                                    </div>
                                )}
                            </section>

                            {/* Log */}
                            <section style={{ ...S.panel, flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", borderBottom: "none" }}>
                                <Label>◈ LOG SYSTEMOWY</Label>
                                <div style={{ flex: 1, overflowY: "auto" }}>
                                    {log.map((l, i) => (
                                        <div key={i} style={{ display: "flex", gap: 6, marginBottom: 4, opacity: Math.max(0.2, 1 - i * 0.04) }}>
                                            <span style={{ color: "#2e2e2e", flexShrink: 0, fontSize: 10 }}>{l.ts}</span>
                                            <span style={{ color: i === 0 ? l.color : "#484848", fontSize: 10 }}>{l.msg}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </aside>

                        {/* ── Lista pulsów ── */}
                        <main style={S.main}>
                            {entries.length === 0 && (
                                <div style={S.empty}>
                                    <div style={{ fontSize: 32, marginBottom: 8, color: "#1e1e1e" }}>⊙</div>
                                    <div>BRAK ZAREJESTROWANYCH WĘZŁÓW</div>
                                </div>
                            )}

                            {entries.map(entry => {
                                const isActive  = activePulses.has(entry.id);
                                const isFading  = fadingPulses.has(entry.id);
                                const isEditing = editingId === entry.id;
                                const liveBpm   = liveBpms.has(entry.id) ? liveBpms.get(entry.id) : entry.bpm;
                                const dispBpm   = Math.round(liveBpm * 10) / 10;
                                const barPct    = Math.max(0, Math.min(100, ((liveBpm - MIN_BPM) / (MAX_BPM - MIN_BPM)) * 100));
                                const dotColor  = isFading ? "#f9c74f" : isActive ? "#00ff88" : "#1c1c1c";

                                return (
                                    <div key={entry.id} style={{
                                        ...S.row,
                                        borderColor: isActive ? (eqActive ? "#35300f" : "#0f2e18") : "#111",
                                        background:  isActive ? "#0b0b0b" : "#080808",
                                    }}>
                                        {isEditing ? (
                                            /* ── Tryb edycji ── */
                                            <div style={{ flex: 1, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                                                <input
                                                    style={{ ...S.input, width: 80, padding: "4px 7px", fontSize: 12, marginBottom: 0 }}
                                                    value={editName}
                                                    onChange={e => setEditName(e.target.value.toUpperCase())}
                                                    maxLength={10}
                                                    autoFocus
                                                />
                                                <input
                                                    style={{ ...S.input, width: 60, padding: "4px 7px", fontSize: 12, marginBottom: 0 }}
                                                    type="number"
                                                    value={editTempo}
                                                    onChange={e => setEditTempo(e.target.value)}
                                                    min={MIN_BPM} max={MAX_BPM}
                                                />
                                                {editError && <span style={{ color: "#f94144", fontSize: 10 }}>▲ {editError}</span>}
                                                <Btn label="✓" color="#00ff88" onClick={() => commitEdit(entry)} title="Zapisz" />
                                                <Btn label="✕" color="#f94144" onClick={cancelEdit} title="Anuluj" />
                                            </div>
                                        ) : (
                                            /* ── Tryb normalny ── */
                                            <>
                                                {/* Dot statusu */}
                                                <div style={{
                                                    width: 7, height: 7, borderRadius: "50%", flexShrink: 0,
                                                    background: dotColor,
                                                    boxShadow: isActive ? `0 0 7px ${isFading ? "#f9c74f70" : "#00ff8870"}` : "none",
                                                    animation: isActive && !isFading ? "blink 1.2s ease-in-out infinite" : "none",
                                                }} />

                                                {/* Nazwa */}
                                                <div style={{ width: 80, flexShrink: 0 }}>
                                                    <div style={{
                                                        fontSize: 14, fontWeight: "bold",
                                                        letterSpacing: "0.1em",
                                                        color: isActive ? "#e8e8e8" : "#383838"
                                                    }}>
                                                        {entry.name}
                                                    </div>
                                                </div>

                                                {/* BPM + pasek */}
                                                <div style={{ flex: 1, minWidth: 0 }}>
                                                    <div style={{ display: "flex", alignItems: "baseline", gap: 4, marginBottom: 4 }}>
                                                        <span style={{
                                                            fontSize: 20,
                                                            fontVariantNumeric: "tabular-nums",
                                                            transition: "color .5s",
                                                            color: isActive ? (eqActive ? "#f9c74f" : "#d8d8d8") : "#282828",
                                                        }}>
                                                            {dispBpm}
                                                        </span>
                                                        <span style={{ fontSize: 9, color: "#3a3a3a", letterSpacing: "0.15em" }}>BPM</span>
                                                    </div>
                                                    <div style={{ background: "#111", height: 2 }}>
                                                        <div style={{
                                                            height: "100%",
                                                            width: `${barPct}%`,
                                                            background: isActive ? (eqActive ? "#f9c74f" : "#00ff88") : "#1c1c1c",
                                                            transition: "width .08s linear, background .5s",
                                                        }} />
                                                    </div>
                                                </div>

                                                {/* Przyciski sterowania */}
                                                <div style={{ display: "flex", gap: 4, flexShrink: 0, alignItems: "center" }}>
                                                    {!isActive
                                                        ? <Btn label="▶" color="#00ff88" onClick={() => handlePlay(entry)} title="Odtwórz" />
                                                        : <>
                                                            <Btn label="◼" color="#f94144" onClick={() => handleStop(entry)} title="Zatrzymaj" />
                                                            <Btn label={isFading ? "…" : "↓"} color="#f9c74f"
                                                                 onClick={() => !isFading && handleFade(entry)} title="Wycisz" disabled={isFading} />
                                                          </>
                                                    }
                                                    <div style={{ width: 1, height: 18, background: "#1e1e1e", margin: "0 2px" }} />
                                                    <Btn label="✎" color="#7df9d0" onClick={() => startEdit(entry)} title="Edytuj" small />
                                                    <Btn label="✕" color="#444"    onClick={() => handleDelete(entry)} title="Usuń" small />
                                                </div>
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                        </main>
                    </div>

                    {/* ── Status bar ── */}
                    <footer style={S.statusBar}>
                        {[
                            { k: "WĘZŁY",    v: entries.length,    c: "#555" },
                            { k: "AKTYWNE",  v: activePulses.size, c: "#00ff88" },
                            { k: "WYCISZANE",v: fadingPulses.size, c: "#f9c74f" },
                            eqActive ? { k: "EQ", v: `${Math.round(eqProgress * 100)}%`, c: "#f9c74f" } : null,
                        ].filter(Boolean).map(x => (
                            <div key={x.k} style={{ display: "flex", gap: 6, alignItems: "baseline" }}>
                                <span style={{ fontSize: 9, color: "#2e2e2e", letterSpacing: "0.2em" }}>{x.k}</span>
                                <span style={{ fontSize: 14, color: x.c }}>{x.v}</span>
                            </div>
                        ))}
                    </footer>

                    <style>{`
                        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
                        * { box-sizing: border-box; }
                        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
                        input[type=number] { -moz-appearance: textfield; }
                        ::-webkit-scrollbar { width: 3px; }
                        ::-webkit-scrollbar-track { background: #090909; }
                        ::-webkit-scrollbar-thumb { background: #202020; }
                    `}</style>
                </div>
            );
        }

        // ─── STYLE TOKENS ─────────────────────────────────────────────────────────────
        const S = {
            root: {
                fontFamily: "'Courier New', Courier, monospace",
                background: "#080808", color: "#c8c8c8",
                minHeight: "100vh", display: "flex", flexDirection: "column",
                fontSize: 12, letterSpacing: "0.04em",
            },
            header: {
                borderBottom: "1px solid #161616", padding: "10px 20px",
                display: "flex", justifyContent: "space-between", alignItems: "center",
                background: "#090909",
            },
            sub:   { fontSize: 9, color: "#333", letterSpacing: "0.2em", marginBottom: 2 },
            title: { fontSize: 14, fontWeight: "bold", color: "#e0e0e0", letterSpacing: "0.15em" },
            clock: { fontSize: 20, color: "#e8e8e8", fontVariantNumeric: "tabular-nums" },
            body:  { display: "flex", flex: 1, overflow: "hidden" },
            aside: {
                width: 260, borderRight: "1px solid #141414",
                display: "flex", flexDirection: "column", overflow: "hidden", flexShrink: 0,
            },
            panel:    { padding: "14px 16px", borderBottom: "1px solid #141414" },
            input: {
                width: "100%", background: "#0d0d0d", border: "1px solid #202020",
                color: "#d8d8d8", padding: "6px 9px", fontSize: 13,
                letterSpacing: "0.1em", outline: "none",
                fontFamily: "'Courier New', Courier, monospace",
                marginBottom: 0,
            },
            err:      { color: "#f94144", fontSize: 10, marginBottom: 6 },
            btnWhite: {
                width: "100%", background: "#d8d8d8", color: "#000", border: "none",
                padding: "7px 0", fontSize: 10, letterSpacing: "0.2em",
                cursor: "pointer", fontFamily: "inherit", fontWeight: "bold", marginTop: 6,
            },
            btnEq: {
                width: "100%", border: "1px solid", padding: "9px 0",
                fontSize: 10, letterSpacing: "0.2em",
                cursor: "pointer", fontFamily: "inherit", fontWeight: "bold",
            },
            track: { background: "#111", height: 2, marginTop: 4 },
            fill:  { height: "100%" },
            main:  {
                flex: 1, overflowY: "auto", padding: "10px 12px",
            },
            row: {
                display: "flex", alignItems: "center", gap: 10,
                border: "1px solid", marginBottom: 6, padding: "9px 12px",
                transition: "border-color .3s, background .3s", minHeight: 52,
            },
            statusBar: {
                borderTop: "1px solid #111", padding: "7px 16px",
                display: "flex", gap: 24, background: "#090909",
            },
            empty: {
                display: "flex", alignItems: "center", justifyContent: "center",
                height: "60vh", color: "#222", fontSize: 11, letterSpacing: "0.2em",
                flexDirection: "column",
            },
        };

        // ─── MOUNT ───────────────────────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
